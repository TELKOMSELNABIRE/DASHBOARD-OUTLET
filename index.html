<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Triple-T Outlet Nabire</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f4f6f8;
  margin: 0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #b51217;
  color: #fff;
  padding: 12px 20px;
}

.logo { height: 40px; }

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}

nav button {
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

nav button.active {
  background: #b51217;
  color: #fff;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 10px 20px;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

th {
  background: #f0f0f0;
}

.highlight-rank1 td { background: #e8f5e9; }
.highlight-rank2 td { background: #f1f8e9; }
.highlight-rank3 td { background: #fffde7; }
</style>
</head>

<body>

<header>
  <h2>Dashboard Triple-T Outlet Nabire</h2>
  <img src="LOGO TSEL PUTIH.png" class="logo">
</header>

<nav>
  <button class="active" onclick="loadData('TRASSER', this)">TRASSER</button>
  <button onclick="loadData('TRAGIS', this)">TRAGIS</button>
  <button onclick="loadData('TRAVO', this)">TRAVO</button>
</nav>

<div class="container">
  <input type="text" id="search" placeholder="Search outlet...">

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Outlet ID</th>
        <th>Nama Outlet</th>
        <th>Eligible</th>
        <th>Score</th>
        <th>Rev M-1</th>
        <th>Rev M</th>
        <th>MoM</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzfkFMws7efeTXbGSbIJEa7ulOgL9uhFkwWErJBCPjYgUE56gSueLZWR0rDouJTJLuVdw/exec";

let allData = [];

// 🔢 FORMAT RUPIAH
function formatRupiah(angka) {
  if (!angka || angka == "-") return "-";
  return "Rp" + Number(angka).toLocaleString("id-ID");
}

// 📊 FORMAT PERSEN
function formatPersen(angka) {
  if (!angka || angka == "-") return "-";
  return (Number(angka) * 100).toFixed(2) + "%";
}

// 🔢 PARSE NUMBER
function parseNumber(str) {
  if (!str) return 0;
  return Number(str.toString().replace(/[Rp,%\s.]/g, ""));
}

// LOAD DATA
function loadData(sheet, btn) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  const tbody = document.getElementById("data");
  tbody.innerHTML = "<tr><td colspan='8'>Loading...</td></tr>";

  fetch(`${API_URL}?sheet=${sheet}`)
    .then(res => res.json())
    .then(data => {
      allData = data;
      renderTable(data);
    })
    .catch(() => {
      tbody.innerHTML = "<tr><td colspan='8'>Gagal mengambil data</td></tr>";
    });
}

// RENDER TABLE
function renderTable(data) {
  const tbody = document.getElementById("data");
  let html = "";

  data.forEach(d => {

    const rank = parseNumber(d["Rank"]);

    let rowClass = "";
    if (rank === 1) rowClass = "highlight-rank1";
    else if (rank === 2) rowClass = "highlight-rank2";
    else if (rank === 3) rowClass = "highlight-rank3";

    // 🎨 WARNA MOM
    let momVal = Number(d["MoM"]);
    let momColor = "";
    if (momVal > 0) momColor = "color:green;font-weight:600;";
    else if (momVal < 0) momColor = "color:red;font-weight:600;";

    html += `
      <tr class="${rowClass}">
        <td>${d["Rank"] || "-"}</td>
        <td>${d["Outlet ID"] || ""}</td>
        <td>${d["Nama Outlet"] || ""}</td>
        <td>${d["Eligible"] || ""}</td>
        <td>${(d["Score"])}</td>
        <td>${formatRupiah(d["Rev SS Bulan Lalu"])}</td>
        <td>${formatRupiah(d["Rev SS Bulan Ini"])}</td>
        <td style="${momColor}">${formatPersen(d["MoM"])}</td>
      </tr>
    `;
  });

  tbody.innerHTML = html || "<tr><td colspan='8'>Tidak ada data</td></tr>";
}

// SEARCH
document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();

  const filtered = allData.filter(d =>
    (d["Nama Outlet"] || "").toLowerCase().includes(v)
  );

  renderTable(filtered);
});

// LOAD AWAL
loadData("TRASSER", document.querySelector("nav button.active"));
</script>

</body>
</html>
