<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Triple-T Outlet Nabire</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f4f6f8;
  margin: 0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #b51217;
  color: #fff;
  padding: 12px 20px;
}

header h2 {
  margin: 0;
  font-size: 18px;
}

.logo {
  height: 40px;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}

nav button {
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  background: #e0e0e0;
}

nav button.active {
  background: #b51217;
  color: #fff;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 10px 20px;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

th {
  background: #f0f0f0;
}

/* HIGHLIGHT */
.highlight-rank1 td { background: #e8f5e9; }
.highlight-rank2 td { background: #f1f8e9; }
.highlight-rank3 td { background: #fffde7; }

</style>
</head>

<body>

<header>
  <h2>Dashboard Triple-T Outlet Nabire</h2>
  <img src="LOGO TSEL PUTIH.png" class="logo">
</header>

<nav>
  <button class="active" onclick="loadData('TRASSER', this)">TRASSER</button>
  <button onclick="loadData('TRAGIS', this)">TRAGIS</button>
  <button onclick="loadData('TRAVO', this)">TRAVO</button>
</nav>

<div class="container">
  <input type="text" id="search" placeholder="Search outlet...">

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Outlet ID</th>
        <th>Nama Outlet</th>
        <th>Eligible</th>
        <th>Score</th>
        <th>Rev M-1</th>
        <th>Rev M</th>
        <th>MoM</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyUkRm2WLla2Vb65Lv892KAsixSCjQbrFrjPVEfe3UNA0woDPDCY5Rs-QeL9QFlnFn-7g/exec";

let allData = [];

// parsing angka
function parseNumber(str) {
  if (!str) return 0;
  return Number(str.toString().replace(/[Rp,%\s.]/g, ""));
}

// ambil data
function loadData(sheet, btn) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  const tbody = document.getElementById("data");
  tbody.innerHTML = "<tr><td colspan='8'>Loading...</td></tr>";

  fetch(`${API_URL}?sheet=${sheet}`)
    .then(res => res.json())
    .then(data => {
      console.log("DATA:", data);

      if (!Array.isArray(data)) {
        tbody.innerHTML = "<tr><td colspan='8'>Format data salah</td></tr>";
        return;
      }

      if (data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='8'>Data kosong</td></tr>";
        return;
      }

      allData = data;
      renderTable(data);
    })
    .catch(err => {
      console.error("ERROR:", err);
      tbody.innerHTML = "<tr><td colspan='8'>Gagal mengambil data</td></tr>";
    });
}

// render tabel
function renderTable(data) {
  const tbody = document.getElementById("data");
  let html = "";

  data.forEach(d => {
    if (!Array.isArray(d)) return;

    // mapping sesuai spreadsheet
    const rank = parseNumber(d[9]);

    let rowClass = "";
    if (rank === 1) rowClass = "highlight-rank1";
    else if (rank === 2) rowClass = "highlight-rank2";
    else if (rank === 3) rowClass = "highlight-rank3";

    html += `
      <tr class="${rowClass}">
        <td>${d[9] ?? ""}</td>
        <td>${d[0] ?? ""}</td>
        <td>${d[2] ?? ""}</td>
        <td>${d[7] ?? ""}</td>
        <td>${d[8] ?? ""}</td>
        <td>${d[4] ?? ""}</td>
        <td>${d[5] ?? ""}</td>
        <td>${d[6] ?? ""}</td>
      </tr>
    `;
  });

  tbody.innerHTML = html || "<tr><td colspan='8'>Tidak ada data</td></tr>";
}

// search
document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();

  const filtered = allData.filter(d =>
    Array.isArray(d) && (d[2] || "").toString().toLowerCase().includes(v)
  );

  renderTable(filtered);
});

// load pertama
loadData("TRASSER", document.querySelector("nav button.active"));
</script>

</body>
</html>
